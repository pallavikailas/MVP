name: Deploy MVP → GitHub Pages

on:
  push:
    branches: [MVP]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: https://fairlens-api-nrk2z2yadq-uc.a.run.app
          VITE_FULL_PROTOTYPE_URL: https://fairlens-frontend-nrk2z2yadq-uc.a.run.app
        run: npm run build

      # GitHub Pages doesn't handle SPA client-side routing natively.
      # Copying index.html → 404.html tells it to serve the app shell for unknown paths.
      - name: Fix SPA routing for GitHub Pages
        run: cp frontend/dist/index.html frontend/dist/404.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
